name: Build Binary Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: node20-linux-x64
            artifact: efficio-server-linux-x64
          - os: ubuntu-22.04-arm
            target: node20-linux-arm64
            artifact: efficio-server-linux-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: |
          cd server
          npm ci --production

      - name: Build TypeScript
        run: |
          cd server
          npm run build

      - name: Install pkg
        run: npm install -g pkg@5.8.1

      - name: Build binary with pkg
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT_NAME: ${{ matrix.artifact }}
        run: |
          cd server
          # 构建二进制
          pkg . --targets "$TARGET" --output dist/efficio-server --no-bytecode

      - name: Prepare artifact
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
        run: |
          mkdir -p release
          cp server/dist/efficio-server release/
          cp .env.example release/
          cd release
          chmod +x efficio-server
          tar -czvf "${ARTIFACT_NAME}.tar.gz" efficio-server .env.example

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*.tar.gz
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
