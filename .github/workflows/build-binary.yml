name: Build Binary Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x64
          - os: ubuntu-22.04
            target: node20-linux-x64
            artifact: efficio-server-linux-x64
          # macOS x64
          - os: macos-latest
            target: node20-macos-x64
            artifact: efficio-server-macos-x64
          # Windows x64
          - os: windows-latest
            target: node20-win-x64
            artifact: efficio-server-win-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: |
          cd server
          npm ci

      - name: Build TypeScript
        run: |
          cd server
          npm run build

      - name: Install pkg
        run: npm install -g @yao-pkg/pkg@latest

      - name: Build binary with pkg
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT_NAME: ${{ matrix.artifact }}
          RUNNER_OS: ${{ runner.os }}
        run: |
          cd server
          # 构建二进制 - @yao-pkg/pkg 会自动添加 .exe 扩展名在 Windows 上
          # 先尝试带 --no-bytecode，如果失败则不带此选项
          npx @yao-pkg/pkg . --targets "$TARGET" --output dist/efficio-server --no-bytecode 2>&1 || \
          npx @yao-pkg/pkg . --targets "$TARGET" --output dist/efficio-server

      - name: Verify binary was created
        run: |
          echo "=== Checking dist directory ==="
          ls -la server/dist/

      - name: Prepare artifact (Linux/macOS)
        if: runner.os != 'Windows'
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
        run: |
          mkdir -p release
          cp server/dist/efficio-server release/
          cp ${{ github.workspace }}/.env.example release/
          cd release
          chmod +x efficio-server
          tar -czvf "${ARTIFACT_NAME}.tar.gz" efficio-server .env.example
          echo "Created artifact: $(ls -la *.tar.gz)"

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          # pkg 在 Windows 上会自动添加 .exe 扩展名
          Copy-Item -Path "server/dist/efficio-server.exe" -Destination "release/efficio-server.exe"
          Copy-Item -Path "${{ github.workspace }}/.env.example" -Destination "release/.env.example"
          Set-Location release
          Compress-Archive -Path .\efficio-server.exe, .\.env.example -DestinationPath "${ARTIFACT_NAME}.zip" -Force
          Write-Host "Created artifact: $(Get-ChildItem *.zip | Format-Table -HideTableHeaders | Out-String)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*
          retention-days: 60

  release:
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: false

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded Artifacts ==="
          find ./artifacts -type f
          echo "==========================="

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/efficio-server-linux-x64/*.tar.gz
            artifacts/efficio-server-macos-x64/*.tar.gz
            artifacts/efficio-server-win-x64/*.zip
          generate_release_notes: true
          draft: true
          prerelease: false
