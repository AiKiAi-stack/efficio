name: Build Binary Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x64
          - os: ubuntu-22.04
            target: node20-linux-x64
            artifact: efficio-server-linux-x64
            ext: ""
          # macOS x64
          - os: macos-latest
            target: node20-macos-x64
            artifact: efficio-server-macos-x64
            ext: ""
          # Windows x64
          - os: windows-latest
            target: node20-win-x64
            artifact: efficio-server-win-x64
            ext: ".exe"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: |
          cd server
          npm ci --production

      - name: Build TypeScript
        run: |
          cd server
          npm run build

      - name: Install pkg
        run: npm install -g pkg@5.8.1

      - name: Build binary with pkg
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT_NAME: ${{ matrix.artifact }}
        run: |
          cd server
          # 构建二进制
          pkg . --targets "$TARGET" --output dist/efficio-server --no-bytecode

      - name: Prepare artifact (Linux/macOS)
        if: runner.os != 'Windows'
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
        run: |
          mkdir -p release
          cp server/dist/efficio-server release/
          cp .env.example release/
          cd release
          chmod +x efficio-server
          tar -czvf "${ARTIFACT_NAME}.tar.gz" efficio-server .env.example

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item -Path server/dist/efficio-server.exe -Destination release/
          Copy-Item -Path .env.example -Destination release/
          Set-Location release
          Compress-Archive -Path efficio-server.exe, .env.example -DestinationPath "${ARTIFACT_NAME}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: false

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded Artifacts ==="
          find ./artifacts -type f
          echo "==========================="

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/efficio-server-linux-x64/*.tar.gz
            artifacts/efficio-server-macos-x64/*.tar.gz
            artifacts/efficio-server-win-x64/*.zip
          generate_release_notes: true
          draft: true
          prerelease: false
